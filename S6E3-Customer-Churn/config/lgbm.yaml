# Core & Learning Control
boosting_type: gbdt
num_leaves: 24
max_depth: -1
learning_rate: 0.05
min_child_samples: 20
min_child_weight: 0.001

# Sampling & Regularization
subsample: 0.8
bagging_freq: 1
colsample_bytree: 0.7
reg_alpha: 0.1
reg_lambda: 0.1

# Objective & Environment
objective: binary
metric: 
  - auc
  - binary_logloss

# Others
random_state: 42
n_jobs: -1
verbosity: -1